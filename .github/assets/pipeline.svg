<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Vision model pipeline: camera frame, palm detector with skip-or-crop branch, hand landmarker, pose landmarker, into atomic results">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#11151c"/><stop offset="1" stop-color="#0b0e13"/>
    </linearGradient>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4ed7c9"/>
    </marker>
    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5b6675"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="300" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="899" height="299" rx="15.5" fill="none" stroke="#222a35"/>

  <g font-family="-apple-system,'Segoe UI',Roboto,sans-serif">
    <!-- camera -->
    <rect x="30" y="118" width="120" height="64" rx="10" fill="#151b24" stroke="#2c3543"/>
    <text x="90" y="146" font-size="14" font-weight="600" fill="#e6e9ee" text-anchor="middle">Camera frame</text>
    <text x="90" y="166" font-size="11" fill="#8b949e" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">1280×720 RGB</text>

    <!-- palm detector -->
    <rect x="196" y="118" width="130" height="64" rx="10" fill="#101a18" stroke="#2f5a55"/>
    <text x="261" y="142" font-size="14" font-weight="600" fill="#e6e9ee" text-anchor="middle">Palm Detector</text>
    <text x="261" y="160" font-size="10.5" fill="#7fb8b2" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">TFLite · 192²</text>
    <text x="261" y="174" font-size="10.5" fill="#7fb8b2" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">every 3rd frame</text>

    <!-- branch label -->
    <text x="356" y="146" font-size="10.5" fill="#6c7686" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">palm?</text>

    <!-- skip -->
    <rect x="378" y="48" width="108" height="46" rx="10" fill="#151b24" stroke="#39414d" stroke-dasharray="4 3"/>
    <text x="432" y="70" font-size="13" font-weight="600" fill="#aeb6c2" text-anchor="middle">Skip frame</text>
    <text x="432" y="86" font-size="10" fill="#6c7686" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">reuse last result</text>

    <!-- crop + warp -->
    <rect x="378" y="126" width="108" height="48" rx="10" fill="#151b24" stroke="#2c3543"/>
    <text x="432" y="148" font-size="13" font-weight="600" fill="#e6e9ee" text-anchor="middle">Crop + warp</text>
    <text x="432" y="164" font-size="10.5" fill="#8b949e" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">→ 224×224</text>

    <!-- hand landmarker -->
    <rect x="528" y="118" width="130" height="64" rx="10" fill="#101a18" stroke="#2f5a55"/>
    <text x="593" y="142" font-size="14" font-weight="600" fill="#e6e9ee" text-anchor="middle">Hand Landmarker</text>
    <text x="593" y="160" font-size="10.5" fill="#7fb8b2" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">TFLite</text>
    <text x="593" y="174" font-size="10.5" fill="#7fb8b2" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">21 points</text>

    <!-- pose landmarker -->
    <rect x="528" y="210" width="130" height="56" rx="10" fill="#101a18" stroke="#2f5a55"/>
    <text x="593" y="234" font-size="14" font-weight="600" fill="#e6e9ee" text-anchor="middle">Pose Landmarker</text>
    <text x="593" y="252" font-size="10.5" fill="#7fb8b2" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">33 keypoints</text>

    <!-- results -->
    <rect x="700" y="118" width="168" height="64" rx="10" fill="#1a1308" stroke="#3a2f1a"/>
    <text x="784" y="142" font-size="14" font-weight="600" fill="#ffb24a" text-anchor="middle">atomic&lt;Results&gt;</text>
    <text x="784" y="162" font-size="10.5" fill="#c99a5b" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">→ audio + render</text>
  </g>

  <!-- arrows -->
  <g fill="none">
    <line x1="150" y1="150" x2="194" y2="150" stroke="#4ed7c9" marker-end="url(#a)"/>
    <line x1="326" y1="150" x2="370" y2="150" stroke="#4ed7c9" marker-end="url(#a)"/>
    <!-- branch up to skip -->
    <path d="M340,140 C356,120 360,80 376,71" stroke="#5b6675" marker-end="url(#ag)"/>
    <!-- crop+warp -> hand -->
    <line x1="486" y1="150" x2="526" y2="150" stroke="#4ed7c9" marker-end="url(#a)"/>
    <!-- hand -> pose -->
    <path d="M593,182 L593,208" stroke="#4ed7c9" marker-end="url(#a)"/>
    <!-- hand -> results -->
    <line x1="658" y1="150" x2="698" y2="150" stroke="#4ed7c9" marker-end="url(#a)"/>
    <!-- pose -> results -->
    <path d="M658,238 C690,238 700,182 720,178" stroke="#4ed7c9" marker-end="url(#a)"/>
    <!-- skip loops back to results too (reuse) -->
    <path d="M486,71 C620,71 700,110 740,116" stroke="#39414d" stroke-dasharray="4 3" marker-end="url(#ag)"/>
  </g>

  <text x="450" y="290" font-size="11" font-family="ui-monospace,Menlo,monospace" fill="#6c7686" text-anchor="middle">Detection is amortized — the expensive palm pass runs at a third of the frame rate; landmarks track every frame.</text>
</svg>
